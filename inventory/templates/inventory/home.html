{% extends "inventory/base.html" %}

{% block content %}
<style>
  .home-container {
    max-width: 500px;
    margin: 40px auto;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 32px 24px;
    text-align: center;
  }
  h2 {
    color: #2c3e50;
    margin-bottom: 24px;
  }
  .menu-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .menu-list li {
    margin: 18px 0;
  }
  .menu-list a {
    display: inline-block;
    padding: 12px 32px;
    background: #3498db;
    color: #fff;
    border-radius: 6px;
    text-decoration: none;
    font-size: 1.1em;
    transition: background 0.2s;
  }
  .menu-list a:hover {
    background: #217dbb;
  }
</style>

<div class="home-container">
  <h2>Warehouse Stock System</h2>
  <ul class="menu-list">
    <li><a href="{% url 'product_list' %}">Product List</a></li>
    <li><a href="{% url 'add_product' %}">Add Product</a></li>
    <li><a href="{% url 'transaction_list' %}">Stock Transactions</a></li>
    <li><a href="{% url 'add_transaction' %}">Add Transaction</a></li>
  </ul>
</div>
{% endblock %}
