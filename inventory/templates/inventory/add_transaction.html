<h2>Add Stock Transaction</h2>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  {{ formset.management_form }}
  {% for form in formset %}
    <div style="border:1px solid #ccc; margin:10px; padding:10px;">
      {{ form.as_p }}
    </div>
  {% endfor %}
  <button type="submit">Save</button>
</form>
